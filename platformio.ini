[env:pico]
;platform = raspberrypi
board = pico
;framework = picosdk
board_build.core = earlephilhower


platform = https://github.com/maxgerhardt/platform-raspberrypi.git#651837d09a1a58c46bd1bcf4647468d8c5ed92c2
framework = arduino

build_flags =
  -DPIO_STDIO_USB
  -DPICO_STDIO_USB_USE_DEFAULT_DESCRIPTORS=0
  -DCFG_TUD_HID=1
  -DCFG_TUD_HID_EP_BUFSIZE=64
